name: Build Windows App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npx vite build --base=./
        env:
          NODE_ENV: production

      - name: Install Python packages
        run: pip install pywebview pyinstaller

      - name: Build Windows exe with PyInstaller
        run: >
          pyinstaller
          --onefile
          --noconsole
          --name "PDF Drawing Viewer"
          --add-data "dist/public;dist/public"
          launcher.py

      - name: Validate exe exists
        shell: pwsh
        run: |
          $exe = "dist\PDF Drawing Viewer.exe"
          if (Test-Path $exe) {
            $size = (Get-Item $exe).Length / 1MB
            Write-Host "PASS: exe found, size $([math]::Round($size,1)) MB"
          } else {
            throw "FAIL: exe not found at $exe"
          }

      - name: Smoke test - run exe on Windows and verify it stays alive
        shell: pwsh
        run: |
          Write-Host "Launching exe..."
          $proc = Start-Process -FilePath "dist\PDF Drawing Viewer.exe" -PassThru
          Write-Host "Waiting 25 seconds..."
          Start-Sleep -Seconds 25
          if ($proc.HasExited) {
            Write-Host "FAIL: process exited early (code $($proc.ExitCode))"
            exit 1
          }
          Write-Host "PASS: process running after 25s (PID $($proc.Id))"
          Stop-Process -Id $proc.Id -Force

      - name: Upload Windows exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Drawing-Viewer-Windows
          path: "dist/PDF Drawing Viewer.exe"
          if-no-files-found: error
          retention-days: 30
