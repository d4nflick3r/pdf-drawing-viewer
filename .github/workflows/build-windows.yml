name: Build Windows App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npx vite build --base=./
        env:
          NODE_ENV: production

      - name: Install Electron
        run: npm install --no-save electron

      - name: Package app from Electron binaries
        shell: pwsh
        run: |
          $src = "node_modules/electron/dist"
          $out = "app-package"

          # Copy Electron runtime as the base
          Copy-Item -Recurse "$src" "$out"

          # Remove default placeholder app if present
          $defaultApp = "$out/resources/default_app.asar"
          if (Test-Path $defaultApp) { Remove-Item $defaultApp }

          # Create our app structure
          New-Item -ItemType Directory -Force -Path "$out/resources/app/dist"
          New-Item -ItemType Directory -Force -Path "$out/resources/app/electron"

          # Copy built frontend and Electron main process
          Copy-Item -Recurse "dist/public" "$out/resources/app/dist/"
          Copy-Item "electron/main.cjs" "$out/resources/app/electron/"

          # package.json: tells Electron which file is the entry point
          Set-Content -Path "$out/resources/app/package.json" -Value '{"name":"pdf-drawing-viewer","version":"1.0.0","main":"electron/main.cjs","description":"PDF Drawing Viewer"}'

          # Rename exe
          Rename-Item "$out/electron.exe" "PDF Drawing Viewer.exe"

      - name: Validate package structure
        shell: pwsh
        run: |
          $errors = 0

          $checks = @(
            "app-package/PDF Drawing Viewer.exe",
            "app-package/resources/app/electron/main.cjs",
            "app-package/resources/app/dist/public/index.html",
            "app-package/resources/app/package.json"
          )

          foreach ($file in $checks) {
            if (Test-Path $file) {
              Write-Host "PASS: $file"
            } else {
              Write-Host "FAIL: $file NOT FOUND"
              $errors++
            }
          }

          $pkg = Get-Content "app-package/resources/app/package.json" | ConvertFrom-Json
          if ($pkg.main -eq "electron/main.cjs") {
            Write-Host "PASS: package.json main = $($pkg.main)"
          } else {
            Write-Host "FAIL: package.json main = $($pkg.main)"
            $errors++
          }

          $assets = Get-ChildItem "app-package/resources/app/dist/public/assets" -ErrorAction SilentlyContinue
          if ($assets.Count -gt 0) {
            Write-Host "PASS: $($assets.Count) asset files found"
          } else {
            Write-Host "FAIL: no assets found in dist/public/assets"
            $errors++
          }

          if ($errors -gt 0) {
            throw "$errors validation check(s) failed"
          }
          Write-Host "All validation checks passed."

      - name: Zip the package
        shell: pwsh
        run: |
          Compress-Archive -Path "app-package/*" -DestinationPath "PDF-Drawing-Viewer-Windows.zip"
          $size = (Get-Item "PDF-Drawing-Viewer-Windows.zip").Length / 1MB
          Write-Host "Zip size: $([math]::Round($size, 1)) MB"

      - name: Upload Windows zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Drawing-Viewer-Windows
          path: PDF-Drawing-Viewer-Windows.zip
          if-no-files-found: error
          retention-days: 30
