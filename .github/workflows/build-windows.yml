name: Build Windows App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (relative asset paths for file:// protocol)
        run: npx vite build --base=./
        env:
          NODE_ENV: production

      - name: Install Electron and electron-builder
        run: npm install --no-save electron electron-builder

      - name: Patch package.json for Electron (add main, description, author)
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.main = 'electron/main.cjs';
            pkg.description = pkg.description || 'PDF technical drawing viewer';
            pkg.author = pkg.author || 'PDF Drawing Viewer';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            console.log('package.json patched successfully');
          "

      - name: Build Windows zip
        run: npx electron-builder --win --x64 --publish never

      - name: Upload Windows zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Drawing-Viewer-Windows
          path: dist-electron/*.zip
          if-no-files-found: error
          retention-days: 30
