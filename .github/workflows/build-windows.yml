name: Build Windows App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (relative asset paths for file:// protocol)
        run: npx vite build --base=./
        env:
          NODE_ENV: production

      - name: Install Electron
        run: npm install --no-save electron

      - name: Package app manually from Electron binaries
        shell: pwsh
        run: |
          $src = "node_modules/electron/dist"
          $out = "app-package"

          # Copy Electron binaries as the base
          Copy-Item -Recurse "$src" "$out"

          # Remove the default placeholder app
          $defaultApp = "$out/resources/default_app.asar"
          if (Test-Path $defaultApp) { Remove-Item $defaultApp }

          # Create our app structure inside resources/app/
          New-Item -ItemType Directory -Force -Path "$out/resources/app/dist"
          New-Item -ItemType Directory -Force -Path "$out/resources/app/electron"

          # Copy built frontend and main process
          Copy-Item -Recurse "dist/public" "$out/resources/app/dist/"
          Copy-Item "electron/main.cjs" "$out/resources/app/electron/"

          # Write minimal package.json that tells Electron where to start
          Set-Content -Path "$out/resources/app/package.json" -Value '{"name":"pdf-drawing-viewer","version":"1.0.0","main":"electron/main.cjs","description":"PDF Drawing Viewer"}'

          # Rename the exe to something friendly
          Rename-Item "$out/electron.exe" "PDF Drawing Viewer.exe"

          # Zip the entire package
          Compress-Archive -Path "$out/*" -DestinationPath "PDF-Drawing-Viewer-Windows.zip"

          Write-Host "Done. Contents:"
          Get-ChildItem "$out" | Select-Object Name

      - name: Upload Windows zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Drawing-Viewer-Windows
          path: PDF-Drawing-Viewer-Windows.zip
          if-no-files-found: error
          retention-days: 30
