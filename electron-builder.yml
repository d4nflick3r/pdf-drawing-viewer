appId: com.drawingviewer.pdf
productName: PDF Drawing Viewer
electronEntryPoint: electron/main.cjs
copyright: Copyright © 2025

directories:
  output: dist-electron

files:
  - dist/public/**/*
  - electron/main.cjs

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: PDF Drawing Viewer

publish: null
